<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<title>门户迎宾图 — 3 个方向</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; background: #f0eee9; }
  body { font-family: "Noto Sans SC", "Space Grotesk", -apple-system, BlinkMacSystemFont, "PingFang SC", system-ui, sans-serif; }
  #root { height: 100%; }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="src/banner-cosmos.jsx"></script>
<script type="text/babel" src="src/banner-holographic.jsx"></script>
<script type="text/babel" src="src/banner-minimal.jsx"></script>

<script type="text/babel">
const { DesignCanvas, DCSection, DCArtboard, DCPostIt } = window;
const { BannerCosmos, BannerHolographic, BannerMinimal } = window;

function App() {
  return (
    <DesignCanvas initialZoom={0.5}>
      <DCSection
        id="welcome-banners"
        title="门户迎宾图 · 三个方向"
        subtitle="同一组产品（HiAgent · AgentSphere · 扣子 · Trae），不同的视觉语言。每张画板都是可点击的可交互原型；右上角放大查看全屏效果。"
      >
        <DCArtboard id="cosmos" label="A · 深空星轨" width={1680} height={460} bg="#05060f">
          <BannerCosmos />
        </DCArtboard>

        <DCArtboard id="holo" label="B · 全息光晕" width={1680} height={620} bg="#fafafa">
          <BannerHolographic />
        </DCArtboard>

        <DCArtboard id="minimal" label="C · 极简未来" width={1680} height={560} bg="#f5f4ef">
          <BannerMinimal />
        </DCArtboard>
      </DCSection>

      <DCPostIt x={40} y={60} width={260}>
        三个方向各自独立。文案均为占位符，可直接替换。Logo 已就位，跳转链接 placeholder（# 锚点）。
      </DCPostIt>
    </DesignCanvas>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
